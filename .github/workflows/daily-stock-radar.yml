name: Daily Stock Radar

on:
  schedule:
    - cron: "0 13 * * 1-5"
    - cron: "45 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-stock-radar
  cancel-in-progress: false

jobs:
  run-radar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily radar
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python scripts/run_daily_radar.py
          python scripts/export_static_dashboard.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public outputs
          if git diff --cached --quiet; then
            echo "No generated output changes."
          else
            git commit -m "Update daily stock radar outputs"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Optionally publish sanitized public dashboard repo
        env:
          PUBLIC_DASHBOARD_REPO: ${{ vars.PUBLIC_DASHBOARD_REPO }}
          PUBLIC_DASHBOARD_BRANCH: ${{ vars.PUBLIC_DASHBOARD_BRANCH || 'main' }}
          DASHBOARD_DEPLOY_TOKEN: ${{ secrets.DASHBOARD_DEPLOY_TOKEN }}
        run: |
          if [ -z "$PUBLIC_DASHBOARD_REPO" ] || [ -z "$DASHBOARD_DEPLOY_TOKEN" ]; then
            echo "PUBLIC_DASHBOARD_REPO or DASHBOARD_DEPLOY_TOKEN not configured; skipping public dashboard publish."
            exit 0
          fi

          rm -rf public-dashboard-publish
          git clone "https://x-access-token:${DASHBOARD_DEPLOY_TOKEN}@github.com/${PUBLIC_DASHBOARD_REPO}.git" public-dashboard-publish
          cd public-dashboard-publish
          git checkout "$PUBLIC_DASHBOARD_BRANCH" || git checkout -b "$PUBLIC_DASHBOARD_BRANCH"
          cd ..
          find public-dashboard-publish -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R frontend/dist/. public-dashboard-publish/
          cd public-dashboard-publish
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public dashboard changes."
          else
            git commit -m "Update stock radar dashboard"
            git push origin "HEAD:${PUBLIC_DASHBOARD_BRANCH}"
          fi
